<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flanagan Law — Myth vs Reality</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 40px;
      font-family: 'Montserrat', sans-serif;
    }

    .slide-wrapper {
      width: 540px;
      height: 675px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }

    .slide {
      width: 1080px;
      height: 1350px;
      transform: scale(0.5);
      transform-origin: top left;
      position: relative;
      overflow: hidden;
    }

    /* ── PHOTO ── */
    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      filter: grayscale(100%) contrast(1.1) brightness(0.85);
    }

    /* ── OVERLAYS ── */
    .overlay-top {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(30,34,50,0.6) 0%,
        rgba(30,34,50,0.3) 25%,
        rgba(30,34,50,0.7) 45%,
        rgba(30,34,50,0.93) 65%,
        rgba(30,34,50,1) 80%
      );
      z-index: 1;
    }

    /* ── TOP BAR ── */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 72px 80px;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-tag {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #C89D66;
      text-transform: uppercase;
    }

    .brand-tag::before {
      content: '';
      display: block;
      width: 36px;
      height: 2px;
      background: #C89D66;
      flex-shrink: 0;
    }

    /* ── MAIN CONTENT ── */
    .content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 0 80px 90px;
    }

    /* MYTH block */
    .myth-block {
      margin-bottom: 52px;
    }

    .myth-label {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .myth-label .badge {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 24px;
      border-radius: 100px;
    }

    .myth-label .cross {
      font-size: 28px;
      color: rgba(255,255,255,0.3);
    }

    .myth-text {
      font-size: 32px;
      font-weight: 500;
      font-style: italic;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 52px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, #C89D66, rgba(200,157,102,0.2));
    }

    .divider-icon {
      width: 48px;
      height: 48px;
      border: 2px solid #C89D66;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #C89D66;
      font-size: 20px;
      flex-shrink: 0;
    }

    /* REALITY block */
    .reality-block {
      margin-bottom: 72px;
    }

    .reality-label {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .reality-label .badge {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #C89D66;
      background: rgba(200,157,102,0.12);
      border: 1px solid rgba(200,157,102,0.4);
      padding: 10px 24px;
      border-radius: 100px;
    }

    .reality-text {
      font-size: 34px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.5;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    .reality-text .highlight {
      color: #C89D66;
    }

    /* BOTTOM BAR */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(200,157,102,0.2);
      padding-top: 44px;
    }

    .bottom-bar img {
      height: 38px;
      opacity: 0.75;
    }

    .tagline {
      font-size: 18px;
      font-weight: 500;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="slide-wrapper">
    <div class="slide">

      <!-- Photo -->
      <img class="photo"
        src="https://raw.githubusercontent.com/panchobarberis-maker/Flanangan/main/Captura%20de%20pantalla%202026-06-23%20221148.jpg"
        alt="Brendan Flanagan">

      <!-- Overlays -->
      <div class="overlay-top"></div>

      <!-- Top bar -->
      <div class="top-bar">
        <div class="brand-tag">Flanagan Law, P.C.</div>
      </div>

      <!-- Content -->
      <div class="content">

        <!-- MYTH -->
        <div class="myth-block">
          <div class="myth-label">
            <span class="badge">Myth</span>
            <span class="cross">✕</span>
          </div>
          <div class="myth-text">
            "If you were partially at fault, you can't recover anything."
          </div>
        </div>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-icon">✓</div>
          <div class="divider-line" style="background: linear-gradient(to left, #C89D66, rgba(200,157,102,0.2));"></div>
        </div>

        <!-- REALITY -->
        <div class="reality-block">
          <div class="reality-label">
            <span class="badge">Reality</span>
          </div>
          <div class="reality-text">
            Georgia follows a modified comparative fault rule. You can still recover compensation as long as you were
            <span class="highlight">less than 50% at fault.</span>
          </div>
        </div>

        <!-- Bottom bar -->
        <div class="bottom-bar">
          <img src="https://raw.githubusercontent.com/panchobarberis-maker/Flanangan/main/flanagan%20law%20logo%20sand.png" alt="Flanagan Law">
          <span class="tagline">Your fight is our fight.</span>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
